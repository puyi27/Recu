<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Avanzado 1 - Imagen y jQuery</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f0f0; padding: 20px; }
        .contenedor { background: white; padding: 20px; margin-bottom: 30px; border: 2px solid black; }
        .acordeon-item { border-bottom: 2px solid black; margin-bottom: 10px; }
        .acordeon-titulo { background: black; color: white; padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; margin: 0; }
        .acordeon-contenido { padding: 15px; background: #e0e0e0; display: none; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h2>1. Imagen Responsiva (Sin picture)</h2>
        <img src="https://picsum.photos/id/1025/1000/600" 
             srcset="https://picsum.photos/id/1025/500/300 500w, 
                     https://picsum.photos/id/1025/1000/600 1000w, 
                     https://picsum.photos/id/1025/1500/900 1500w"
             sizes="(max-width: 576px) 100vw, 
                    (max-width: 992px) 50vw, 
                    33vw"
             alt="Concierto brutalista"
             style="border: 4px solid black; width: 100%; height: auto;">
    </div>

    <div class="contenedor">
        <h2>2. Acordeón jQuery (SlideToggle)</h2>
        <div id="faq-gira">
            <div class="acordeon-item">
                <h3 class="acordeon-titulo">FECHAS DELLAFUENTE 2026</h3>
                <div class="acordeon-contenido">
                    <p>Madrid: 12 de Octubre. Entradas agotadas.</p>
                </div>
            </div>
            <div class="acordeon-item">
                <h3 class="acordeon-titulo">VIP ACCESS</h3>
                <div class="acordeon-contenido">
                    <p>Acceso al meet & greet y merch exclusivo.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $(".acordeon-titulo").click(function() {
                $(".acordeon-contenido").not($(this).next()).slideUp(300);
                $(this).next().slideToggle(300);
            });
        });
    </script>
</body>
</html>
